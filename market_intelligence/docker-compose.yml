# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Market Intelligence Platform
# Services: django | postgres | redis | celery_worker | celery_beat
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

x-django-env: &django-env
  env_file: .env
  environment:
    DJANGO_SETTINGS_MODULE: config.settings

# ── Shared build context for all Python services ──────────────────────────────
x-app-base: &app-base
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - .:/app
    - ./logs:/app/logs
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  <<: *django-env

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mi_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-market_intelligence}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mi_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Django (Gunicorn) ────────────────────────────────────────────────────────
  django:
    <<: *app-base
    container_name: mi_django
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py collectstatic --no-input &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 4
               --timeout 120
               --log-level info"
    ports:
      - "8000:8000"

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery_worker:
    <<: *app-base
    container_name: mi_celery_worker
    command: >
      celery -A config.celery worker
        --loglevel=info
        --queues=ingestion,default,ml
        --concurrency=4
        --max-tasks-per-child=100
    depends_on:
      - postgres
      - redis

  # ── Celery Beat ──────────────────────────────────────────────────────────────
  celery_beat:
    <<: *app-base
    container_name: mi_celery_beat
    command: >
      celery -A config.celery beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
